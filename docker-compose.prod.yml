# -----------------------------------------------------------------------------
# Production Compose file
#
# Pulls pre-built image from Docker Hub. Deploy to VPS with:
#
#   1. git pull
#   2. Edit .env (DB_PASSWORD, APP_KEY)
#   3. docker compose -f docker-compose.prod.yml pull
#   4. docker compose -f docker-compose.prod.yml up -d
#
# Cloudflare DNS proxy handles SSL. App exposed on port 8080.
# -----------------------------------------------------------------------------

name: rent-car-prod

services:
  app:
    image: nabiilnuryassar/rent-car:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      RUN_MIGRATIONS: 'true'
      RUN_SEEDERS: 'false'
      LINK_STORAGE: 'true'
    volumes:
      - app_storage:/var/www/html/storage
    ports:
      - '80:8080'
    networks:
      - rentcar_prod_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rentcar}
      POSTGRES_USER: ${DB_USERNAME:-rentcar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rentcar -d rentcar']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentcar_prod_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    networks:
      - rentcar_prod_net

volumes:
  app_storage:
  postgres_prod_data:
  redis_prod_data:

networks:
  rentcar_prod_net:
    driver: bridge
