# -----------------------------------------------------------------------------
# Production Compose file with Cloudflare Tunnel
#
# Cloudflare Tunnel menghapus kebutuhan untuk:
#   - Buka port 80/443 di server
#   - Setup nginx eksternal di host
#   - Beli/konfigurasi SSL certificate (Let's Encrypt dll)
#   - DDoS protection manual
#
# Cara deploy:
#   1. Buat tunnel di Cloudflare Zero Trust dashboard
#   2. Copy tunnel token ke .env.docker sebagai CLOUDFLARE_TUNNEL_TOKEN
#   3. Copy .env.docker.example → .env.docker, edit APP_KEY dll
#   4. docker compose -f docker-compose.prod.yml up -d --build
# -----------------------------------------------------------------------------

name: rent-car

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWUSER: 1000
        WWWGROUP: 1000
    image: rent-car:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env.docker
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-rentcar}
      DB_USERNAME: ${DB_USERNAME:-rentcar}
      DB_PASSWORD: ${DB_PASSWORD:-please_change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      RUN_MIGRATIONS: 'true'
      LINK_STORAGE: 'true'
      # Trust Cloudflare proxy headers (X-Forwarded-For, X-Forwarded-Proto)
      TRUSTED_PROXIES: '*'
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_public_storage:/var/www/html/storage/app/public
    # Jika kamu mau akses langsung (misal dari VPN/LAN) tanpa Cloudflare,
    # uncomment baris di bawah. Untuk production murni via Tunnel, biarkan
    # tertutup — lebih aman karena port 8080 tidak exposed ke internet.
    # ports:
    #   - "127.0.0.1:8080:8080"
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:8080/healthz']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rentcar_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rentcar}
      POSTGRES_USER: ${DB_USERNAME:-rentcar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-please_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-rentcar} -d ${DB_DATABASE:-rentcar}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentcar_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--maxmemory-policy',
        'allkeys-lru',
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentcar_net

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel
  #
  # Menghubungkan container app ke domain kamu di Cloudflare tanpa
  # expose port. TLS di-handle di edge Cloudflare.
  #
  # Setup:
  #   1. Dashboard Cloudflare Zero Trust → Networks → Tunnels → Create
  #   2. Beri nama (mis. "rent-car-prod"), pilih Docker sebagai connector
  #   3. Copy tunnel token → simpan di .env.docker sebagai CLOUDFLARE_TUNNEL_TOKEN
  #   4. Di tab "Public Hostname", tambahkan:
  #        Subdomain: app (atau kosong untuk root)
  #        Domain:    pilih domain kamu
  #        Service:   http://app:8080
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - rentcar_net

volumes:
  app_storage:
  app_public_storage:
  postgres_data:
  redis_data:

networks:
  rentcar_net:
    driver: bridge
