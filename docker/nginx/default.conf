server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Handle real client IP behind load balancer / CDN
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Security headers (basic baseline; tighten per domain)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health checks
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Do not log favicon/robots misses
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets with long cache (Vite hashed filenames)
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|ico|gif|jpe?g|png|webp|avif|map)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Trust the frontend proxy for HTTPS detection
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
    }

    # Deny hidden files and common dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny direct access to storage, vendor, and composer files
    location ~ ^/(storage|vendor|composer\.(json|lock))(/|$) {
        deny all;
    }
}
