# -----------------------------------------------------------------------------
# Development Compose file
#
# Runs PHP + PostgreSQL + Redis only. Vite runs on host with `npm run dev`.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   npm install && npm run dev   (on the host)
#
# For a fully containerized dev setup, uncomment the `vite` service below.
# -----------------------------------------------------------------------------

name: rent-car-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        WWWUSER: 1000
        WWWGROUP: 1000
    image: rent-car:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${APP_KEY:-}
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: rentcar
      DB_USERNAME: rentcar
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      RUN_MIGRATIONS: 'true'
      RUN_SEEDERS: 'true'
    volumes:
      # Bind-mount the source so edits reload immediately (no image rebuild).
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    ports:
      - '8080:8080'
    networks:
      - rentcar_dev_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentcar
      POSTGRES_USER: rentcar
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rentcar -d rentcar']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentcar_dev_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - rentcar_dev_net

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    networks:
      - rentcar_dev_net

volumes:
  postgres_dev_data:

networks:
  rentcar_dev_net:
    driver: bridge
